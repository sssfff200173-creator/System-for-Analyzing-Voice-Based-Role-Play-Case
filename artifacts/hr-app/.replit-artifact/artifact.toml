kind = "web"
previewPath = "/"
title = "HR Voice Assessment"
version = "1.0.0"
id = "artifacts/hr-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 5000

[services.development]
run = "cd /home/runner/workspace/frontend && npm run dev"

[services.env]
PORT = "5000"
BASE_PATH = "/"

[services.production.build]
args = ["bash", "-c", "cd /home/runner/workspace/frontend && npm ci && npm run build"]

[services.production.run]
args = ["python", "-m", "uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "5000"]

[services.production.run.env]
PORT = "5000"
