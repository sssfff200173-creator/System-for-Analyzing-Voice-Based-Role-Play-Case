kind = "web"
previewPath = "/"
title = "HR Assessment"
version = "1.0.0"
id = "artifacts/hr-stub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18664

[services.development]
run = "pnpm install && pnpm --filter @workspace/hr-assessment run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hr-assessment", "run", "build" ]
publicDir = "artifacts/hr-assessment/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18664"
BASE_PATH = "/"
